<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Match the Animal to its Sound</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ================= SPLASH SCREEN ================= -->

<div id="logoScreen" class="screen">

    <img src="assets/innovine-logo.png"
         alt="Innovine Logo"
         id="logo">

</div>

<!-- ================= INSTRUCTION SCREEN ================= -->

<div id="gameScreen" class="screen hidden">

<div class="instructionBox">

<h1>🐾 Match the Animal to its Sound</h1>

<p>

Click on a <b>Sound Card</b>.

Then click on the matching animal picture.

</p>

<br>

<p>

Listen carefully before choosing.

</p>

<br>

<p>

⭐ Correct = Stars + Thumbs Up

</p>

<p>

❌ Wrong = Try Again

</p>

<br>

<button id="startBtn">

Start Game

</button>

</div>

</div>

<!-- ================= GAME SCREEN ================= -->

<div id="gameScreen" class="hidden">

<header>

<h2>🐘 Match the Animal to its Sound</h2>

<div id="scoreBox">

Score :

<span id="score">0</span>

/

8

</div>

</header>

<div class="gameContainer">

<!-- LEFT -->

<div id="animalColumn" class="column">

</div>

<!-- RIGHT -->

<div id="soundColumn" class="column">

</div>

</div>

</div>

<!-- ================= MESSAGE ================= -->

<div id="message">

</div>

<!-- ================= SCORE SCREEN ================= -->

<div id="endScreen" class="screen hidden">

<div class="instructionBox">

<h1>🎉 Well Done!</h1>

<h2 id="finalScore"></h2>

<button onclick="location.reload()">

Play Again

</button>

</div>

</div>

<!-- ================= AUDIO ================= -->

<audio id="correctAudio"
src="assets/correct.mp3.mp3"
preload="auto"></audio>

<audio id="wrongAudio"
src="assets/wrong.mp3.mp3"
preload="auto"></audio>

<!-- ================= SCRIPT ================= -->

<script src="script.js"></script>

</body>
</html>
